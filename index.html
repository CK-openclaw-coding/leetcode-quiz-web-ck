<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 刷題系統 (優化版)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" title="切換深淺色模式">🌓</button>

    <div class="container">
        <header>
            <h1>檔案載入刷題系統</h1>
            <p>由 小高 (CK) 優化，支援自動載入與錯題記憶功能。</p>
        </header>

        <!-- 上傳區域 -->
        <div class="card upload-section" id="upload-section">
            <h3>請載入題目與答案檔</h3>
            <div class="upload-row">
                <label>1. 載入題目 (questions.json)：</label>
                <input type="file" id="q-file" accept=".json" onchange="handleFiles('q', this)">
            </div>
            <div class="upload-row">
                <label>2. 載入答案 (answers.json)：</label>
                <input type="file" id="a-file" accept=".json" onchange="handleFiles('a', this)">
            </div>
            <div id="status-msg" class="status">等待載入檔案...</div>
            <div style="margin-top: 20px;">
                <button id="start-btn" style="display:none;" onclick="initQuiz('all')">開始測驗</button>
            </div>
        </div>

        <!-- 測驗區域 -->
        <div id="quiz-area" style="display: none;">
            <div class="progress-container">
                <div style="text-align: center; margin-bottom: 10px;">
                    <span id="mode-indicator" class="badge">載入中...</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <input type="text" class="search-box" placeholder="🔍 搜尋題目關鍵字..." oninput="filterQuestions(this.value)">

            <div id="score-board" class="score-board"></div>
            
            <div id="quiz-container"></div>
            
            <div class="controls" style="margin-top: 40px; padding-bottom: 60px;">
                <button class="btn-submit" onclick="submitQuiz()">交卷並查看分數</button>
                <button id="btn-retry-wrong" class="warning" style="display: none;" onclick="initQuiz('wrong')">練習錯題</button>
                <button class="secondary" onclick="location.reload()">重新開始 / 載入新檔</button>
            </div>
        </div>
    </div>

    <script src="script.js?v=1776218290"></script>
</body>
</html>
