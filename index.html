<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 刷題系統 (優化版)</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .badge.mode-practice { background-color: #e67e22; }
        .badge.mode-normal { background-color: #3498db; }
        #shuffle-toggle { cursor: pointer; transition: 0.3s; }
        #shuffle-toggle:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" title="切換深淺色模式">🌓</button>

    <div class="container">
        <header>
            <h1>檔案載入刷題系統</h1>
            <p>由 小高 (CK) 優化，支援自動載入、錯題記憶與題庫亂序功能。</p>
        </header>

        <!-- 測驗區域 (改為預設顯示，除非沒選題) -->
        <div id="quiz-area" style="display: block;">
            <div class="progress-container">
                <div style="text-align: center; margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; align-items: center;">
                    <select id="quiz-select" class="quiz-select-main" onchange="loadSelectedQuiz()">
                        <option value="">-- 請選擇今日主題 --</option>
                    </select>
                    <span id="mode-indicator" class="badge mode-normal">等待選題</span>
                    <span id="shuffle-toggle" class="badge mode-normal" onclick="toggleShuffle()">🔀 亂序：關閉</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div id="start-section" style="text-align: center; margin: 40px 0;">
                <p id="status-msg" style="color: #666;">請從上方選單選擇題庫以開始</p>
                <button id="start-btn" style="display:none;" onclick="initQuiz('all')">開始測驗</button>
            </div>

            <input type="text" class="search-box" placeholder="🔍 搜尋題目關鍵字..." oninput="filterQuestions(this.value)">

            <div id="score-board" class="score-board"></div>
            
            <div id="quiz-container"></div>
            
            <div class="controls" style="margin-top: 40px; padding-bottom: 60px;">
                <button class="btn-submit" onclick="submitQuiz()">交卷並查看分數</button>
                <button id="btn-retry-wrong" class="warning" style="display: none;" onclick="initQuiz('wrong')">練習錯題</button>
                <button class="secondary" onclick="location.reload()">回主選單</button>
            </div>
        </div>

        <footer style="text-align: center; margin-top: 20px; padding: 20px; font-size: 0.8em; color: #999;">
            <a href="manage.html" style="color: #999; text-decoration: none;">⚙️ 管理與上傳題庫</a>
        </footer>
    </div>

    <script src="script.js?v=1776220512"></script>
</body>
</html>
